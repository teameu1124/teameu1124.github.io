<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>USD/KRW 실시간 환율</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090b;
  --surface: #101013;
  --border: #1c1c22;
  --text: #ededf2;
  --muted: #52526a;
  --accent: #00e5a0;
  --accent-dim: rgba(0,229,160,0.10);
  --red: #ff4560;
  --red-dim: rgba(255,69,96,0.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', 'Courier New', monospace;
  -webkit-font-smoothing: antialiased;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,160,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,160,0.018) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 460px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 0 18px;
}

/* ── HEADER ── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.pair-badge { display: flex; align-items: center; gap: 10px; }
.flag-wrap { display: flex; align-items: center; }
.flag {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface);
}
.flag:last-child { margin-left: -7px; }

.pair-name {
  font-family: 'Syne', 'Arial Black', sans-serif;
  font-size: 15px; font-weight: 700; letter-spacing: 0.08em;
}

/* LIVE badge — 보조, 작고 조용하게 */
.live-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: 9px; letter-spacing: 0.14em; color: #38385a;
  border: 1px solid #1c1c22; border-radius: 20px; padding: 3px 9px;
}

.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent);
  animation: blink 2.2s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* 타이틀 — 중간 중요도 */
.neon-title {
  font-family: 'Syne', 'Arial Black', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: #00c987;
  text-shadow: 0 0 6px rgba(0,229,160,0.25), 0 0 14px rgba(0,229,160,0.12);
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

/* ── PRICE BLOCK ── */
.price-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 0 20px;
}

.tv-quote-wrap {
  width: 100%;
  position: relative;
  overflow: hidden;
  height: 55px;
  margin-bottom: 4px;
}
.tv-quote-wrap .tradingview-widget-container,
.tv-quote-wrap .tradingview-widget-container__widget {
  width: 100% !important;
  height: 250px !important;
  position: relative;
  top: -100px;
}

/* 날짜 — 4순위, 아주 조용하게 */
.date-line {
  font-size: 9px;
  color: #38385a;
  letter-spacing: 0.1em;
  margin-top: 4px;
}

/* 시간 — 3순위, 날짜보다 살짝 밝게 */
.clock {
  font-size: 13px;
  font-weight: 500;
  color: #6a6a88;
  letter-spacing: 0.06em;
  margin-top: 1px;
  cursor: pointer;
  transition: color 0.15s;
  user-select: none;
}
.clock:hover { color: #a0a0c0; }

/* ── FEAR & GREED — 2순위, 눈에 띄게 ── */
.fg-badge {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 1px;
  cursor: pointer;
}
.fg-label {
  font-size: 7px;
  letter-spacing: 0.16em;
  color: #38385a;
  text-transform: uppercase;
}
.fg-value {
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.02em;
  line-height: 1;
}
.fg-text {
  font-size: 8px;
  letter-spacing: 0.08em;
  color: #6a6a88;
  font-weight: 500;
}

/* ── MARKET SESSIONS ── */
.sessions {
  display: flex;
  justify-content: center;
  width: 100%;
  margin-top: 10px;
  gap: 8px;
}
.session-card {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
/* 세션 이름 — 4순위 */
.session-name {
  font-size: 8px;
  letter-spacing: 0.1em;
  color: #38385a;
  white-space: nowrap;
  align-self: flex-start;
}
/* 개장중/폐장 — 2순위, 크고 굵게 */
.session-status {
  font-family: 'Syne', 'Arial Black', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
  white-space: nowrap;
  align-self: center;
}
.session-status.open        { color: var(--accent); }
.session-status.pre-market  { color: #f5c518; }
.session-status.after-market{ color: #ff8c42; }
.session-status.closed      { color: var(--red); }
/* 남은시간 — 3순위 */
.session-remain {
  font-size: 9px;
  color: #6a6a88;
  letter-spacing: 0.02em;
  white-space: nowrap;
  align-self: center;
  font-weight: 500;
}

/* ── FG MODAL ── */
.fg-modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.fg-modal-overlay.show {
  display: flex;
}
.fg-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px 22px;
  width: min(340px, 90vw);
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.fg-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.fg-modal-title {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text);
}
.fg-modal-close {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--border);
  border: none;
  border-radius: 50%;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  line-height: 1;
  flex-shrink: 0;
  transition: background 0.15s, color 0.15s;
  outline: none;
}
.fg-modal-close:hover {
  background: var(--red-dim);
  color: var(--red);
}
.fg-modal-close:focus,
.fg-modal-close:focus-visible {
  outline: none;
}
/* Gauge */
.fg-gauge-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.fg-gauge-svg { width: 100%; max-width: 260px; }
.fg-gauge-num {
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 42px; font-weight: 500;
  letter-spacing: -0.02em;
}
.fg-gauge-label {
  font-family: 'Syne', 'Arial Black', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.fg-query-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
}
.fg-query-time {
  font-size: 9px;
  color: #38385a;
  letter-spacing: 0.08em;
}
.fg-refresh {
  background: none;
  border: 1px solid #2a2a3a;
  border-radius: 4px;
  color: #52526a;
  font-size: 11px;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  transition: color 0.15s, border-color 0.15s;
  outline: none;
  overflow: hidden;
  position: relative;
}
.fg-refresh:hover { color: var(--accent); border-color: var(--accent); }
.fg-refresh .icon {
  display: inline-block;
  transition: opacity 0.2s;
}
.fg-refresh.spinning .icon { animation: spinIcon 0.5s linear; }
.fg-refresh.loading .icon { opacity: 0; }
.fg-refresh.loading::after {
  content: '';
  position: absolute;
  width: 8px; height: 8px;
  border: 1.5px solid #52526a;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spinLoader 0.7s linear infinite;
}
@keyframes spinIcon { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes spinLoader { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.fg-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}
.fg-table th {
  text-align: left;
  color: var(--muted);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 6px;
  border-bottom: 1px solid var(--border);
  font-weight: 400;
}
.fg-table td {
  padding: 7px 6px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  color: var(--text);
}
.fg-table tr:last-child td { border-bottom: none; }
.fg-pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.06em;
}
.chart-block {
  display: flex; flex-direction: column;
  padding-bottom: 20px;
}

.chart-controls {
  display: flex; justify-content: flex-end; gap: 3px;
  padding: 14px 0 10px;
}

/* 타임프레임 버튼 — 보조 UI */
.tf {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #38385a;
  background: none;
  border: 1px solid transparent;
  padding: 4px 9px; border-radius: 4px;
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em;
}
.tf:hover { color: #6a6a88; }
.tf.active {
  color: var(--accent);
  border-color: rgba(0,229,160,0.3);
  background: var(--accent-dim);
  font-weight: 600;
}

.chart-frame {
  width: 100%; height: 280px;
  border: 1px solid var(--border); border-radius: 10px;
  overflow: hidden; background: var(--surface);
}

.tradingview-widget-container { width: 100%; height: 280px; }

/* 하단 stamp — 가장 조용하게 */
.stamp {
  text-align: center; padding: 10px 0 22px;
  font-size: 9px; color: #2e2e42; letter-spacing: 0.1em;
}

/* ── NEWS ACCORDION ── */
.news-block {
  width: 100%;
  padding: 0 0 28px;
}
.news-toggle {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 14px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  outline: none;
  font-family: 'DM Mono', monospace;
}
.news-toggle:hover { border-color: #2e2e42; background: #13131a; }
.news-toggle.open { border-radius: 8px 8px 0 0; border-bottom-color: transparent; }
.news-toggle-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
.news-toggle-label {
  font-size: 10px;
  letter-spacing: 0.16em;
  color: #6a6a88;
  text-transform: uppercase;
}
.news-live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent);
  animation: blink 2.2s ease-in-out infinite;
}
.news-chevron {
  font-size: 10px;
  color: #38385a;
  transition: transform 0.25s ease;
}
.news-toggle.open .news-chevron { transform: rotate(180deg); }

.news-panel {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 8px 8px;
}
.news-panel.open { max-height: 600px; }

.news-list {
  display: flex;
  flex-direction: column;
}
.news-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 11px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  text-decoration: none;
  transition: background 0.15s;
}
.news-item:last-child { border-bottom: none; }
.news-item:hover { background: #13131a; }
.news-item-title {
  font-size: 11px;
  color: var(--text);
  line-height: 1.5;
  letter-spacing: 0.01em;
  font-weight: 500;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.news-item-meta {
  font-size: 8px;
  color: #38385a;
  letter-spacing: 0.06em;
}
.news-loading {
  font-size: 10px;
  color: #38385a;
  text-align: center;
  padding: 18px 0;
  letter-spacing: 0.1em;
}
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="fg-badge">
      <span class="fg-label">공탐지수</span>
      <span class="fg-value" id="fgValue">—</span>
      <span class="fg-text" id="fgText">—</span>
    </div>
    <div class="neon-title">실시간 환율</div>
    <div class="live-badge"><div class="dot"></div>LIVE</div>
  </div>

  <!-- PRICE: TradingView single-quote widget -->
  <div class="price-block">
    <div class="tv-quote-wrap" id="tvQuoteWrap"></div>
    <div class="date-line" id="date"></div>
    <div class="clock" id="clock"></div>
    <div class="sessions">
      <div class="session-card">
        <span class="session-name">🇰🇷 국장 (KRX)</span>
        <span class="session-status" id="krStatus">—</span>
        <span class="session-remain" id="krRemain"></span>
      </div>
      <div class="session-card">
        <span class="session-name">🇺🇸 미장 (NYSE)</span>
        <span class="session-status" id="usStatus">—</span>
        <span class="session-remain" id="usRemain"></span>
      </div>
    </div>
  </div>

  <!-- FG MODAL -->
  <div class="fg-modal-overlay" id="fgOverlay">
    <div class="fg-modal">
      <div class="fg-modal-header">
        <span class="fg-modal-title">공포 &amp; 탐욕 지수</span>
        <button class="fg-modal-close" id="fgClose">✕</button>
      </div>
      <div class="fg-gauge-wrap">
        <svg class="fg-gauge-svg" viewBox="0 0 260 140" id="fgSvg"></svg>
        <div class="fg-gauge-num" id="fgModalNum">—</div>
        <div class="fg-gauge-label" id="fgModalLabel">—</div>
        <div class="fg-query-row">
          <div class="fg-query-time" id="fgQueryTime"></div>
          <button class="fg-refresh" id="fgRefresh" title="새로고침"><span class="icon">↻</span></button>
        </div>
      </div>
      <table class="fg-table">
        <thead><tr><th>기간</th><th>수치</th><th>상태</th></tr></thead>
        <tbody id="fgTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart-block">
    <div class="chart-controls">
      <button class="tf" data-tf="1">1분</button>
      <button class="tf active" data-tf="5">5분</button>
      <button class="tf" data-tf="15">15분</button>
      <button class="tf" data-tf="60">1시간</button>
      <button class="tf" data-tf="D">1일</button>
    </div>
    <div class="chart-frame" id="chartFrame"></div>
  </div>

  <div class="stamp">TradingView 실시간 데이터</div>

  <!-- NEWS ACCORDION -->
  <div class="news-block">
    <button class="news-toggle" id="newsToggle">
      <div class="news-toggle-left">
        <div class="news-live-dot"></div>
        <span class="news-toggle-label">실시간 뉴스</span>
      </div>
      <span class="news-chevron">▼</span>
    </button>
    <div class="news-panel" id="newsPanel">
      <div class="news-list" id="newsList">
        <div class="news-loading">뉴스 로딩 중…</div>
      </div>
    </div>
  </div>

</div>

<script>
/* ── 1. Symbol-Info widget (price + change) ── */
(function() {
  const wrap = document.getElementById('tvQuoteWrap');
  const container = document.createElement('div');
  container.className = 'tradingview-widget-container';
  const inner = document.createElement('div');
  inner.className = 'tradingview-widget-container__widget';
  container.appendChild(inner);
  wrap.appendChild(container);

  const s = document.createElement('script');
  s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-symbol-info.js';
  s.async = true;
  s.textContent = JSON.stringify({
    symbol: 'FX_IDC:USDKRW',
    width: '100%',
    height: 200,
    locale: 'ko',
    colorTheme: 'dark',
    isTransparent: true,
  });
  container.appendChild(s);
})();

/* ── 2. Fear & Greed Index ── */
const FG_ZONES = [
  { max: 25,  color: '#ff4560', bg: 'rgba(255,69,96,0.15)',   label: '극도의 공포' },
  { max: 45,  color: '#ff8c42', bg: 'rgba(255,140,66,0.15)',  label: '공포' },
  { max: 55,  color: '#f5c518', bg: 'rgba(245,197,24,0.15)',  label: '중립' },
  { max: 75,  color: '#7ecf6e', bg: 'rgba(126,207,110,0.15)', label: '탐욕' },
  { max: 100, color: '#00e5a0', bg: 'rgba(0,229,160,0.15)',   label: '극도의 탐욕' },
];
const FG_PERIOD_LABELS = { now:'현재', yesterday:'어제', last_week:'1주일 전', last_month:'1달 전' }; // 테이블 기간 레이블

function fgZone(val) {
  return FG_ZONES.find(z => val <= z.max) || FG_ZONES[4];
}

function drawGauge(val) {
  const svg = document.getElementById('fgSvg');
  const cx = 130, cy = 128, r = 100, strokeW = 18;
  const zones = [
    { from: 0,  to: 25,  color: '#ff4560' },
    { from: 25, to: 45,  color: '#ff8c42' },
    { from: 45, to: 55,  color: '#f5c518' },
    { from: 55, to: 75,  color: '#7ecf6e' },
    { from: 75, to: 100, color: '#00e5a0' },
  ];

  function polarToXY(deg, radius) {
    const rad = (deg - 180) * Math.PI / 180;
    return { x: cx + radius * Math.cos(rad), y: cy + radius * Math.sin(rad) };
  }
  function valToDeg(v) { return v * 1.8; } // 0→0°, 100→180°

  let html = '';
  // Background arc segments
  zones.forEach(z => {
    const a1 = valToDeg(z.from), a2 = valToDeg(z.to);
    const p1 = polarToXY(a1, r), p2 = polarToXY(a2, r);
    const large = (a2 - a1) > 180 ? 1 : 0;
    html += `<path d="M ${p1.x} ${p1.y} A ${r} ${r} 0 ${large} 1 ${p2.x} ${p2.y}"
      fill="none" stroke="${z.color}" stroke-width="${strokeW}" stroke-opacity="0.22"/>`;
  });

  // Active segment highlight
  const zone = fgZone(val);
  const activeZone = zones.find(z => val <= z.to);
  if (activeZone) {
    const a1 = valToDeg(activeZone.from), a2 = valToDeg(activeZone.to);
    const p1 = polarToXY(a1, r), p2 = polarToXY(a2, r);
    const large = (a2 - a1) > 180 ? 1 : 0;
    html += `<path d="M ${p1.x} ${p1.y} A ${r} ${r} 0 ${large} 1 ${p2.x} ${p2.y}"
      fill="none" stroke="${activeZone.color}" stroke-width="${strokeW}" stroke-opacity="0.9"/>`;
  }

  // Needle
  const needleDeg = valToDeg(val);
  const nTip = polarToXY(needleDeg, r - strokeW / 2 - 4);
  const nL = polarToXY(needleDeg - 90, 6);
  const nR = polarToXY(needleDeg + 90, 6);
  html += `<polygon points="${nTip.x},${nTip.y} ${nL.x},${nL.y} ${nR.x},${nR.y}"
    fill="${zone.color}" opacity="0.95"/>`;
  html += `<circle cx="${cx}" cy="${cy}" r="6" fill="${zone.color}" opacity="0.9"/>`;

  // Zone labels
  const labelPos = [
    { v: 12,  txt: '극도\n공포' },
    { v: 35,  txt: '공포' },
    { v: 50,  txt: '중립' },
    { v: 65,  txt: '탐욕' },
    { v: 88,  txt: '극도\n탐욕' },
  ];
  labelPos.forEach(lp => {
    const pos = polarToXY(valToDeg(lp.v), r - strokeW - 16);
    const lines = lp.txt.split('\n');
    const dy = lines.length > 1 ? -6 : 0;
    html += `<text x="${pos.x}" y="${pos.y + dy}" text-anchor="middle" font-size="7" fill="#52526a" font-family="DM Mono,monospace">`;
    lines.forEach((line, i) => {
      html += `<tspan x="${pos.x}" dy="${i === 0 ? 0 : 10}">${line}</tspan>`;
    });
    html += `</text>`;
  });

  // Tick marks + numbers at 0, 25, 50, 75, 100
  const ticks = [
    { v: 0,   label: '0' },
    { v: 25,  label: '25' },
    { v: 50,  label: '50' },
    { v: 75,  label: '75' },
    { v: 100, label: '100' },
  ];
  ticks.forEach(t => {
    const deg = valToDeg(t.v);
    const inner = polarToXY(deg, r - strokeW / 2 - 2);
    const outer = polarToXY(deg, r + strokeW / 2 + 2);
    const numPos = polarToXY(deg, r + strokeW / 2 + 13);
    // tick line
    html += `<line x1="${inner.x}" y1="${inner.y}" x2="${outer.x}" y2="${outer.y}"
      stroke="#3a3a50" stroke-width="1.5"/>`;
    // number
    html += `<text x="${numPos.x}" y="${numPos.y + 3}" text-anchor="middle"
      font-size="8" fill="#4a4a62" font-family="DM Mono,monospace">${t.label}</text>`;
  });

  // Minor ticks at every 10
  for (let v = 0; v <= 100; v += 10) {
    if ([0, 25, 50, 75, 100].includes(v)) continue;
    const deg = valToDeg(v);
    const inner = polarToXY(deg, r - strokeW / 2 + 1);
    const outer = polarToXY(deg, r + strokeW / 2 - 1);
    html += `<line x1="${inner.x}" y1="${inner.y}" x2="${outer.x}" y2="${outer.y}"
      stroke="#2a2a3a" stroke-width="1"/>`;
  }

  svg.innerHTML = html;
}

// Focus trap
fgOverlay.addEventListener('keydown', e => {
  if (!fgOverlay.classList.contains('show')) return;
  const focusable = fgOverlay.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])');
  const first = focusable[0];
  const last = focusable[focusable.length - 1];
  if (e.key === 'Tab') {
    if (e.shiftKey) {
      if (document.activeElement === first) { e.preventDefault(); last.focus(); }
    } else {
      if (document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  }
});

function fmtRemain(ms, label) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${label} ${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}

// 다음 영업일 찾기
function nextTradingDay(d, holidaySet) {
  const next = new Date(d);
  next.setDate(next.getDate() + 1);
  while (next.getDay() === 0 || next.getDay() === 6 || holidaySet.has(toDateStr(next))) {
    next.setDate(next.getDate() + 1);
  }
  return next;
}

function updateSessions() {
  const now = new Date();

  // ── KRX (KST) ──
  const kst = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  const kDay = kst.getDay();
  const kDateStr = toDateStr(kst);
  const kH = kst.getHours(), kM = kst.getMinutes(), kS = kst.getSeconds();
  const kMin = kH * 60 + kM;
  const krxOpen = 9 * 60, krxClose = 15 * 60 + 30;
  const isKrxHoliday = kDay === 0 || kDay === 6 || KRX_HOLIDAYS.has(kDateStr);
  const isKrxOpen = !isKrxHoliday && kMin >= krxOpen && kMin < krxClose;

  const krStatusEl = document.getElementById('krStatus');
  const krRemainEl = document.getElementById('krRemain');

  if (isKrxHoliday) {
    krStatusEl.className = 'session-status closed';
    krStatusEl.textContent = KRX_HOLIDAYS.has(kDateStr) ? '휴장 (공휴일)' : '휴장 (주말)';
    krRemainEl.textContent = '';
  } else if (isKrxOpen) {
    krStatusEl.className = 'session-status open';
    krStatusEl.textContent = '개장 중';
    const closeMs = (krxClose - kMin - 1) * 60000 - kS * 1000 + (60 - kst.getMilliseconds() / 1000) * 1000;
    krRemainEl.textContent = fmtRemain(closeMs, '마감까지');
  } else {
    krStatusEl.className = 'session-status closed';
    krStatusEl.textContent = '폐장';
    let nextOpen;
    if (kMin < krxOpen) {
      nextOpen = new Date(kst);
      nextOpen.setHours(9, 0, 0, 0);
    } else {
      nextOpen = nextTradingDay(kst, KRX_HOLIDAYS);
      nextOpen.setHours(9, 0, 0, 0);
    }
    krRemainEl.textContent = fmtRemain(nextOpen - kst, '개장까지');
  }

  const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const uDay = et.getDay();
  const uDateStr = toDateStr(et);
  const uH = et.getHours(), uM = et.getMinutes(), uS = et.getSeconds();
  const uMin = uH * 60 + uM;

  // 분 단위 경계
  const PRE_OPEN   = 4  * 60;       // 04:00
  const NYSE_OPEN  = 9  * 60 + 30;  // 09:30
  const NYSE_CLOSE = 16 * 60;       // 16:00
  const AFTER_END  = 20 * 60;       // 20:00

  const isNyseHoliday = uDay === 0 || uDay === 6 || NYSE_HOLIDAYS.has(uDateStr);

  const usStatusEl = document.getElementById('usStatus');
  const usRemainEl = document.getElementById('usRemain');

  if (isNyseHoliday) {
    usStatusEl.className = 'session-status closed';
    usStatusEl.textContent = NYSE_HOLIDAYS.has(uDateStr) ? '휴장 (공휴일)' : '휴장 (주말)';
    usRemainEl.textContent = '';
  } else if (uMin < PRE_OPEN) {
    // 자정~04:00 — 완전 폐장
    usStatusEl.className = 'session-status closed';
    usStatusEl.textContent = '폐장';
    const nextPre = new Date(et);
    nextPre.setHours(4, 0, 0, 0);
    usRemainEl.textContent = fmtRemain(nextPre - et, '프리마켓까지');
  } else if (uMin < NYSE_OPEN) {
    usStatusEl.className = 'session-status pre-market';
    usStatusEl.textContent = '프리마켓';
    const nextOpen = new Date(et);
    nextOpen.setHours(9, 30, 0, 0);
    usRemainEl.textContent = fmtRemain(nextOpen - et, '본장까지');
  } else if (uMin < NYSE_CLOSE) {
    usStatusEl.className = 'session-status open';
    usStatusEl.textContent = '본장';
    const nextClose = new Date(et);
    nextClose.setHours(16, 0, 0, 0);
    usRemainEl.textContent = fmtRemain(nextClose - et, '애프터마켓까지');
  } else if (uMin < AFTER_END) {
    usStatusEl.className = 'session-status after-market';
    usStatusEl.textContent = '애프터마켓';
    const nextEnd = new Date(et);
    nextEnd.setHours(20, 0, 0, 0);
    usRemainEl.textContent = fmtRemain(nextEnd - et, '마감까지');
  } else {
    usStatusEl.className = 'session-status closed';
    usStatusEl.textContent = '폐장';
    const nextPre = nextTradingDay(et, NYSE_HOLIDAYS);
    nextPre.setHours(4, 0, 0, 0);
    usRemainEl.textContent = fmtRemain(nextPre - et, '프리마켓까지');
  }
}
updateSessions();

/* ── 4. Clock (HH:MM:SS.d) with 12/24h toggle ── */
let is24h = true;

function updateClock() {
  const now = new Date();
  const yy = String(now.getFullYear()).slice(2);
  const mm = now.getMonth() + 1;
  const dd = now.getDate();
  document.getElementById('date').textContent = `${yy}년 ${mm}월 ${dd}일`;

  const d = Math.floor(now.getMilliseconds() / 100);
  const min = String(now.getMinutes()).padStart(2,'0');
  const ss  = String(now.getSeconds()).padStart(2,'0');

  let timeStr;
  if (is24h) {
    const hh = String(now.getHours()).padStart(2,'0');
    timeStr = `${hh}:${min}:${ss}.${d}`;
  } else {
    const raw = now.getHours();
    const ampm = raw < 12 ? '오전' : '오후';
    const h12 = raw % 12 || 12;
    timeStr = `${ampm} ${h12}:${min}:${ss}.${d}`;
  }
  document.getElementById('clock').textContent = timeStr;
}

const clockEl = document.getElementById('clock');
clockEl.title = '클릭하여 시간 형식 변경';
clockEl.addEventListener('click', () => {

});

setInterval(updateClock, 100);

/* ── 6. News RSS ── */
const newsToggle = document.getElementById('newsToggle');
const newsPanel  = document.getElementById('newsPanel');
let newsLoaded = false;

newsToggle.addEventListener('click', () => {
  const isOpen = newsPanel.classList.contains('open');
  newsToggle.classList.toggle('open', !isOpen);
  newsPanel.classList.toggle('open', !isOpen);
  if (!newsLoaded && !isOpen) {
    loadNews();
    newsLoaded = true;
  }
});

async function loadNews() {
  const list = document.getElementById('newsList');
  const sources = [
    'https://www.hankyung.com/feed/economy',
    'https://www.yna.co.kr/rss/economy.xml',
    'https://rss.etnews.com/Section901.xml',
  ];

  for (const src of sources) {
    try {
      const r = await fetch(src, { signal: AbortSignal.timeout(6000) });
      if (!r.ok) continue;
      const text = await r.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, 'text/xml');
      const items = Array.from(xml.querySelectorAll('item')).slice(0, 5);
      if (items.length === 0) continue;

      list.innerHTML = '';
      items.forEach(item => {
        const title = item.querySelector('title')?.textContent?.trim() || '제목 없음';
        const link  = item.querySelector('link')?.textContent?.trim()
                   || item.querySelector('link')?.nextSibling?.textContent?.trim() || '#';
        const pub   = item.querySelector('pubDate')?.textContent?.trim() || '';
        const date  = pub ? new Date(pub).toLocaleString('ko-KR', {
          month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'
        }) : '';

        const el = document.createElement('a');
        el.className = 'news-item';
        el.href = link;
        el.target = '_blank';
        el.rel = 'noopener noreferrer';
        el.innerHTML = `
          <span class="news-item-title">${title}</span>
          ${date ? `<span class="news-item-meta">${date}</span>` : ''}
        `;
        list.appendChild(el);
      });
      return;
    } catch { continue; }
  }
  list.innerHTML = '<div class="news-loading">뉴스를 불러올 수 없습니다</div>';
}
</script>
