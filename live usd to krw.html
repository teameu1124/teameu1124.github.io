<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>USD/KRW 실시간 환율</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090b;
  --surface: #101013;
  --border: #1c1c22;
  --text: #ededf2;
  --muted: #52526a;
  --accent: #00e5a0;
  --accent-dim: rgba(0,229,160,0.10);
  --red: #ff4560;
  --red-dim: rgba(255,69,96,0.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', 'Courier New', monospace;
  -webkit-font-smoothing: antialiased;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,160,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,160,0.018) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 460px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 0 18px;
}

/* ── HEADER ── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.pair-badge { display: flex; align-items: center; gap: 10px; }

.flag-wrap { display: flex; align-items: center; }

.flag {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface);
}
.flag:last-child { margin-left: -7px; }

.pair-name {
  font-family: 'Syne', 'Arial Black', sans-serif;
  font-size: 15px; font-weight: 700; letter-spacing: 0.08em;
}

.live-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; letter-spacing: 0.12em; color: var(--muted);
  border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px;
}

.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  animation: blink 2.2s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.neon-title {
  font-family: 'Syne', 'Arial Black', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: #00c987;
  text-shadow:
    0 0 6px rgba(0,229,160,0.25),
    0 0 14px rgba(0,229,160,0.12);
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

/* ── PRICE BLOCK ── */
.price-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 0 20px;
}

/* Container for the single-quote widget */
.tv-quote-wrap {
  width: 100%;
  position: relative;
  overflow: hidden;
  border-radius: 0;
  height: 140px;
  margin-bottom: 4px;
}

/* Shift iframe to crop TV header bar, scale up */
.tv-quote-wrap .tradingview-widget-container,
.tv-quote-wrap .tradingview-widget-container__widget {
  width: 100% !important;
  height: 200px !important;
  position: relative;
  top: 10px;
  transform: scale(1.18) translateX(16%);
  transform-origin: top center;
}

/* ── CLOCK ── */
.clock {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-top: 6px;
}

/* ── CHART ── */
.chart-block {
  flex: 1; display: flex; flex-direction: column;
  padding-bottom: 20px;
}

.chart-controls {
  display: flex; justify-content: flex-end; gap: 3px;
  padding: 14px 0 10px;
}

.tf {
  font-family: 'DM Mono', monospace;
  font-size: 11px; color: var(--muted);
  background: none; border: 1px solid transparent;
  padding: 4px 9px; border-radius: 4px;
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em;
}
.tf:hover { color: var(--text); }
.tf.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

.chart-frame {
  width: 100%; height: 280px;
  border: 1px solid var(--border); border-radius: 10px;
  overflow: hidden; background: var(--surface);
}

.tradingview-widget-container { width: 100%; height: 280px; }

.stamp {
  text-align: center; padding: 10px 0 22px;
  font-size: 10px; color: var(--muted); letter-spacing: 0.07em;
}
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div></div>
    <div class="neon-title">실시간 환율</div>
    <div class="live-badge"><div class="dot"></div>LIVE</div>
  </div>

  <!-- PRICE: TradingView single-quote widget -->
  <div class="price-block">
    <div class="tv-quote-wrap" id="tvQuoteWrap"></div>
    <div class="clock" id="clock"></div>
  </div>

  <!-- CHART -->
  <div class="chart-block">
    <div class="chart-controls">
      <button class="tf" data-tf="1">1분</button>
      <button class="tf active" data-tf="5">5분</button>
      <button class="tf" data-tf="15">15분</button>
      <button class="tf" data-tf="60">1시간</button>
      <button class="tf" data-tf="D">1일</button>
    </div>
    <div class="chart-frame" id="chartFrame"></div>
  </div>

  <div class="stamp">TradingView 실시간 데이터</div>
</div>

<script>
/* ── 1. Single-Quote widget (price + change) ── */
(function() {
  const wrap = document.getElementById('tvQuoteWrap');
  const container = document.createElement('div');
  container.className = 'tradingview-widget-container';
  const inner = document.createElement('div');
  inner.className = 'tradingview-widget-container__widget';
  container.appendChild(inner);
  wrap.appendChild(container);

  const s = document.createElement('script');
  s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js';
  s.async = true;
  s.textContent = JSON.stringify({
    symbol: 'FX_IDC:USDKRW',
    width: '100%',
    height: 160,
    locale: 'ko',
    colorTheme: 'dark',
    isTransparent: true,
  });
  container.appendChild(s);
})();

/* ── 2. Clock (HH:MM:SS.d) ── */
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const d  = Math.floor(now.getMilliseconds() / 100); // 0–9
  document.getElementById('clock').textContent = `${hh}:${mm}:${ss}.${d}`;
}
updateClock();
setInterval(updateClock, 100);

/* ── 3. Advanced Chart ── */
let currentTf = '5';

function loadChart(tf) {
  const frame = document.getElementById('chartFrame');
  frame.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'tradingview-widget-container';
  frame.appendChild(wrap);

  const s = document.createElement('script');
  s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  s.async = true;
  s.textContent = JSON.stringify({
    autosize: true,
    symbol: 'FX_IDC:USDKRW',
    interval: tf,
    timezone: 'Asia/Seoul',
    theme: 'dark',
    style: '1',
    locale: 'ko',
    hide_top_toolbar: true,
    hide_legend: true,
    allow_symbol_change: false,
    save_image: false,
    hide_volume: true,
    support_host: 'https://www.tradingview.com',
    backgroundColor: '#101013',
    gridColor: 'rgba(28,28,34,1)',
    overrides: {
      'paneProperties.background': '#101013',
      'paneProperties.backgroundType': 'solid',
      'scalesProperties.textColor': '#52526a',
      'scalesProperties.lineColor': '#1c1c22',
      'mainSeriesProperties.candleStyle.upColor': '#00e5a0',
      'mainSeriesProperties.candleStyle.downColor': '#ff4560',
      'mainSeriesProperties.candleStyle.borderUpColor': '#00e5a0',
      'mainSeriesProperties.candleStyle.borderDownColor': '#ff4560',
      'mainSeriesProperties.candleStyle.wickUpColor': 'rgba(0,229,160,0.55)',
      'mainSeriesProperties.candleStyle.wickDownColor': 'rgba(255,69,96,0.55)',
    },
  });
  wrap.appendChild(s);
}

document.querySelectorAll('.tf').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tf').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTf = btn.dataset.tf;
    loadChart(currentTf);
  });
});

loadChart(currentTf);
</script>
</body>
</html>
