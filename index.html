<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>USD/KRW 실시간 환율</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090b;
  --surface: #101013;
  --border: #1c1c22;
  --text: #ededf2;
  --muted: #52526a;
  --accent: #00e5a0;
  --accent-dim: rgba(0,229,160,0.10);
  --red: #ff4560;
  --red-dim: rgba(255,69,96,0.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', 'Courier New', monospace;
  -webkit-font-smoothing: antialiased;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,160,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,160,0.018) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 460px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 0 18px;
}

/* ── HEADER ── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.pair-badge { display: flex; align-items: center; gap: 10px; }
.flag-wrap { display: flex; align-items: center; }
.flag {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface);
}
.flag:last-child { margin-left: -7px; }

.pair-name {
  font-family: 'Syne', 'Arial Black', sans-serif;
  font-size: 15px; font-weight: 700; letter-spacing: 0.08em;
}

/* LIVE badge — 보조, 작고 조용하게 */
.live-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: 9px; letter-spacing: 0.14em; color: #38385a;
  border: 1px solid #1c1c22; border-radius: 20px; padding: 3px 9px;
}

.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent);
  animation: blink 2.2s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* 타이틀 — 중간 중요도 */
.neon-title {
  font-family: 'Syne', 'Arial Black', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: #00c987;
  text-shadow: 0 0 6px rgba(0,229,160,0.25), 0 0 14px rgba(0,229,160,0.12);
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

/* ── PRICE BLOCK ── */
.price-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 0 20px;
}

.tv-quote-wrap {
  width: 100%;
  position: relative;
  overflow: hidden;
  border-radius: 0;
  height: 140px;
  margin-bottom: 4px;
}
.tv-quote-wrap .tradingview-widget-container,
.tv-quote-wrap .tradingview-widget-container__widget {
  width: 100% !important;
  height: 200px !important;
  position: relative;
  top: 10px;
  transform: scale(1.18) translateX(16%);
  transform-origin: top center;
}
@media (max-width: 480px) {
  .tv-quote-wrap .tradingview-widget-container,
  .tv-quote-wrap .tradingview-widget-container__widget {
    transform: scale(1.18) translateX(10%);
  }
}

/* 날짜 — 4순위, 아주 조용하게 */
.date-line {
  font-size: 9px;
  color: #38385a;
  letter-spacing: 0.1em;
  margin-top: 4px;
}

/* 시간 — 3순위, 날짜보다 살짝 밝게 */
.clock {
  font-size: 13px;
  font-weight: 500;
  color: #6a6a88;
  letter-spacing: 0.06em;
  margin-top: 1px;
  cursor: pointer;
  transition: color 0.15s;
  user-select: none;
}
.clock:hover { color: #a0a0c0; }

/* ── FEAR & GREED — 2순위, 눈에 띄게 ── */
.fg-badge {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 1px;
  cursor: pointer;
}
.fg-label {
  font-size: 7px;
  letter-spacing: 0.16em;
  color: #38385a;
  text-transform: uppercase;
}
.fg-value {
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.02em;
  line-height: 1;
}
.fg-text {
  font-size: 8px;
  letter-spacing: 0.08em;
  color: #6a6a88;
  font-weight: 500;
}

/* ── MARKET SESSIONS ── */
.sessions {
  display: flex;
  justify-content: center;
  width: 100%;
  margin-top: 10px;
  gap: 8px;
}
.session-card {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
/* 세션 이름 — 4순위 */
.session-name {
  font-size: 8px;
  letter-spacing: 0.1em;
  color: #38385a;
  white-space: nowrap;
  align-self: flex-start;
}
/* 개장중/폐장 — 2순위, 크고 굵게 */
.session-status {
  font-family: 'Syne', 'Arial Black', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
  white-space: nowrap;
  align-self: center;
}
.session-status.open        { color: var(--accent); }
.session-status.pre-market  { color: #f5c518; }
.session-status.after-market{ color: #ff8c42; }
.session-status.closed      { color: var(--red); }
/* 남은시간 — 3순위 */
.session-remain {
  font-size: 9px;
  color: #6a6a88;
  letter-spacing: 0.02em;
  white-space: nowrap;
  align-self: center;
  font-weight: 500;
}

/* ── FG MODAL ── */
.fg-badge { cursor: pointer; }
.fg-modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.fg-modal-overlay.show {
  display: flex;
}
.fg-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px 22px;
  width: min(340px, 90vw);
  display: flex;
  flex-direction: column;
  gap: 16px;
}
@keyframes overlayOut {
  from { opacity: 1; }
  to   { opacity: 0; }
}
@keyframes modalOut {
  from { transform: translateY(0) scale(1);       opacity: 1; }
  to   { transform: translateY(24px) scale(0.96); opacity: 0; }
}
.fg-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.fg-modal-title {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text);
}
.fg-modal-close {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--border);
  border: none;
  border-radius: 50%;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  line-height: 1;
  flex-shrink: 0;
  transition: background 0.15s, color 0.15s;
  outline: none;
}
.fg-modal-close:hover {
  background: var(--red-dim);
  color: var(--red);
}
.fg-modal-close:focus,
.fg-modal-close:focus-visible {
  outline: none;
}
/* Gauge */
.fg-gauge-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.fg-gauge-svg { width: 100%; max-width: 260px; }
.fg-gauge-num {
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 42px; font-weight: 500;
  letter-spacing: -0.02em;
}
.fg-gauge-label {
  font-family: 'Syne', 'Arial Black', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
/* Table */
.fg-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}
.fg-table th {
  text-align: left;
  color: var(--muted);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 6px;
  border-bottom: 1px solid var(--border);
  font-weight: 400;
}
.fg-table td {
  padding: 7px 6px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  color: var(--text);
}
.fg-table tr:last-child td { border-bottom: none; }
.fg-pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.06em;
}
.chart-block {
  flex: 1; display: flex; flex-direction: column;
  padding-bottom: 20px;
}

.chart-controls {
  display: flex; justify-content: flex-end; gap: 3px;
  padding: 14px 0 10px;
}

/* 타임프레임 버튼 — 보조 UI */
.tf {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #38385a;
  background: none;
  border: 1px solid transparent;
  padding: 4px 9px; border-radius: 4px;
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em;
}
.tf:hover { color: #6a6a88; }
.tf.active {
  color: var(--accent);
  border-color: rgba(0,229,160,0.3);
  background: var(--accent-dim);
  font-weight: 600;
}

.chart-frame {
  width: 100%; height: 280px;
  border: 1px solid var(--border); border-radius: 10px;
  overflow: hidden; background: var(--surface);
}

.tradingview-widget-container { width: 100%; height: 280px; }

/* 하단 stamp — 가장 조용하게 */
.stamp {
  text-align: center; padding: 10px 0 22px;
  font-size: 9px; color: #2e2e42; letter-spacing: 0.1em;
}
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="fg-badge">
      <span class="fg-label">공탐지수</span>
      <span class="fg-value" id="fgValue">—</span>
      <span class="fg-text" id="fgText">—</span>
    </div>
    <div class="neon-title">실시간 환율</div>
    <div class="live-badge"><div class="dot"></div>LIVE</div>
  </div>

  <!-- PRICE: TradingView single-quote widget -->
  <div class="price-block">
    <div class="tv-quote-wrap" id="tvQuoteWrap"></div>
    <div class="date-line" id="date"></div>
    <div class="clock" id="clock"></div>
    <div class="sessions">
      <div class="session-card">
        <span class="session-name">🇰🇷 국장 (KRX)</span>
        <span class="session-status" id="krStatus">—</span>
        <span class="session-remain" id="krRemain"></span>
      </div>
      <div class="session-card">
        <span class="session-name">🇺🇸 미장 (NYSE)</span>
        <span class="session-status" id="usStatus">—</span>
        <span class="session-remain" id="usRemain"></span>
      </div>
    </div>
  </div>

  <!-- FG MODAL -->
  <div class="fg-modal-overlay" id="fgOverlay">
    <div class="fg-modal">
      <div class="fg-modal-header">
        <span class="fg-modal-title">공포 &amp; 탐욕 지수</span>
        <button class="fg-modal-close" id="fgClose">✕</button>
      </div>
      <div class="fg-gauge-wrap">
        <svg class="fg-gauge-svg" viewBox="0 0 260 140" id="fgSvg"></svg>
        <div class="fg-gauge-num" id="fgModalNum">—</div>
        <div class="fg-gauge-label" id="fgModalLabel">—</div>
      </div>
      <table class="fg-table">
        <thead><tr><th>기간</th><th>수치</th><th>상태</th></tr></thead>
        <tbody id="fgTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart-block">
    <div class="chart-controls">
      <button class="tf" data-tf="1">1분</button>
      <button class="tf active" data-tf="5">5분</button>
      <button class="tf" data-tf="15">15분</button>
      <button class="tf" data-tf="60">1시간</button>
      <button class="tf" data-tf="D">1일</button>
    </div>
    <div class="chart-frame" id="chartFrame"></div>
  </div>

  <div class="stamp">TradingView 실시간 데이터</div>
</div>

<script>
/* ── 1. Single-Quote widget (price + change) ── */
(function() {
  const wrap = document.getElementById('tvQuoteWrap');
  const container = document.createElement('div');
  container.className = 'tradingview-widget-container';
  const inner = document.createElement('div');
  inner.className = 'tradingview-widget-container__widget';
  container.appendChild(inner);
  wrap.appendChild(container);

  const s = document.createElement('script');
  s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js';
  s.async = true;
  s.textContent = JSON.stringify({
    symbol: 'FX_IDC:USDKRW',
    width: '100%',
    height: 160,
    locale: 'ko',
    colorTheme: 'dark',
    isTransparent: true,
  });
  container.appendChild(s);
})();

/* ── 2. Fear & Greed Index ── */
const FG_ZONES = [
  { max: 25,  color: '#ff4560', bg: 'rgba(255,69,96,0.15)',   label: '극도의 공포' },
  { max: 45,  color: '#ff8c42', bg: 'rgba(255,140,66,0.15)',  label: '공포' },
  { max: 55,  color: '#f5c518', bg: 'rgba(245,197,24,0.15)',  label: '중립' },
  { max: 75,  color: '#7ecf6e', bg: 'rgba(126,207,110,0.15)', label: '탐욕' },
  { max: 100, color: '#00e5a0', bg: 'rgba(0,229,160,0.15)',   label: '극도의 탐욕' },
];
const FG_PERIOD_LABELS = { now:'현재', yesterday:'어제', last_week:'1주일 전', last_month:'1달 전' };

function fgZone(val) {
  return FG_ZONES.find(z => val <= z.max) || FG_ZONES[4];
}

function drawGauge(val) {
  const svg = document.getElementById('fgSvg');
  const cx = 130, cy = 128, r = 100, strokeW = 18;
  const zones = [
    { from: 0,  to: 25,  color: '#ff4560' },
    { from: 25, to: 45,  color: '#ff8c42' },
    { from: 45, to: 55,  color: '#f5c518' },
    { from: 55, to: 75,  color: '#7ecf6e' },
    { from: 75, to: 100, color: '#00e5a0' },
  ];

  function polarToXY(deg, radius) {
    const rad = (deg - 180) * Math.PI / 180;
    return { x: cx + radius * Math.cos(rad), y: cy + radius * Math.sin(rad) };
  }
  function valToDeg(v) { return v * 1.8; } // 0→0°, 100→180°

  let html = '';
  // Background arc segments
  zones.forEach(z => {
    const a1 = valToDeg(z.from), a2 = valToDeg(z.to);
    const p1 = polarToXY(a1, r), p2 = polarToXY(a2, r);
    const large = (a2 - a1) > 180 ? 1 : 0;
    html += `<path d="M ${p1.x} ${p1.y} A ${r} ${r} 0 ${large} 1 ${p2.x} ${p2.y}"
      fill="none" stroke="${z.color}" stroke-width="${strokeW}" stroke-opacity="0.22"/>`;
  });

  // Active segment highlight
  const zone = fgZone(val);
  const activeZone = zones.find(z => val <= z.to);
  if (activeZone) {
    const a1 = valToDeg(activeZone.from), a2 = valToDeg(activeZone.to);
    const p1 = polarToXY(a1, r), p2 = polarToXY(a2, r);
    const large = (a2 - a1) > 180 ? 1 : 0;
    html += `<path d="M ${p1.x} ${p1.y} A ${r} ${r} 0 ${large} 1 ${p2.x} ${p2.y}"
      fill="none" stroke="${activeZone.color}" stroke-width="${strokeW}" stroke-opacity="0.9"/>`;
  }

  // Needle
  const needleDeg = valToDeg(val);
  const nTip = polarToXY(needleDeg, r - strokeW / 2 - 4);
  const nL = polarToXY(needleDeg - 90, 6);
  const nR = polarToXY(needleDeg + 90, 6);
  html += `<polygon points="${nTip.x},${nTip.y} ${nL.x},${nL.y} ${nR.x},${nR.y}"
    fill="${zone.color}" opacity="0.95"/>`;
  html += `<circle cx="${cx}" cy="${cy}" r="6" fill="${zone.color}" opacity="0.9"/>`;

  // Zone labels
  const labelPos = [
    { v: 12,  txt: '극도\n공포' },
    { v: 35,  txt: '공포' },
    { v: 50,  txt: '중립' },
    { v: 65,  txt: '탐욕' },
    { v: 88,  txt: '극도\n탐욕' },
  ];
  labelPos.forEach(lp => {
    const pos = polarToXY(valToDeg(lp.v), r - strokeW - 16);
    const lines = lp.txt.split('\n');
    const dy = lines.length > 1 ? -6 : 0;
    html += `<text x="${pos.x}" y="${pos.y + dy}" text-anchor="middle" font-size="7" fill="#52526a" font-family="DM Mono,monospace">`;
    lines.forEach((line, i) => {
      html += `<tspan x="${pos.x}" dy="${i === 0 ? 0 : 10}">${line}</tspan>`;
    });
    html += `</text>`;
  });

  // Tick marks + numbers at 0, 25, 50, 75, 100
  const ticks = [
    { v: 0,   label: '0' },
    { v: 25,  label: '25' },
    { v: 50,  label: '50' },
    { v: 75,  label: '75' },
    { v: 100, label: '100' },
  ];
  ticks.forEach(t => {
    const deg = valToDeg(t.v);
    const inner = polarToXY(deg, r - strokeW / 2 - 2);
    const outer = polarToXY(deg, r + strokeW / 2 + 2);
    const numPos = polarToXY(deg, r + strokeW / 2 + 13);
    // tick line
    html += `<line x1="${inner.x}" y1="${inner.y}" x2="${outer.x}" y2="${outer.y}"
      stroke="#3a3a50" stroke-width="1.5"/>`;
    // number
    html += `<text x="${numPos.x}" y="${numPos.y + 3}" text-anchor="middle"
      font-size="8" fill="#4a4a62" font-family="DM Mono,monospace">${t.label}</text>`;
  });

  // Minor ticks at every 10
  for (let v = 0; v <= 100; v += 10) {
    if ([0, 25, 50, 75, 100].includes(v)) continue;
    const deg = valToDeg(v);
    const inner = polarToXY(deg, r - strokeW / 2 + 1);
    const outer = polarToXY(deg, r + strokeW / 2 - 1);
    html += `<line x1="${inner.x}" y1="${inner.y}" x2="${outer.x}" y2="${outer.y}"
      stroke="#2a2a3a" stroke-width="1"/>`;
  }

  svg.innerHTML = html;
}

function buildFgTable(data) {
  const tbody = document.getElementById('fgTableBody');
  tbody.innerHTML = '';
  data.forEach(item => {
    const val = parseInt(item.value);
    const z = fgZone(val);
    const label = FG_PERIOD_LABELS[item.time_until_update] || item.value_classification;
    const korLabel = { 'Extreme Fear':'극도의 공포','Fear':'공포','Neutral':'중립','Greed':'탐욕','Extreme Greed':'극도의 탐욕' }[item.value_classification] || item.value_classification;
    const periodLabel = (() => {
      if (item.time_until_update === 'now' || !item._period) return '현재';
      return item._period;
    })();
    tbody.innerHTML += `<tr>
      <td style="color:var(--muted)">${item._period || '현재'}</td>
      <td style="font-family:'Syne',sans-serif;font-weight:700;color:${z.color}">${val}</td>
      <td><span class="fg-pill" style="color:${z.color};background:${z.bg}">${korLabel}</span></td>
    </tr>`;
  });
}

let fgData = [];
async function loadFearGreed() {
  try {
    const r = await fetch('https://api.alternative.me/fng/?limit=4', { signal: AbortSignal.timeout(6000) });
    const d = await r.json();
    const periods = ['현재', '어제', '1주일 전', '1달 전'];
    fgData = d.data.map((item, i) => ({ ...item, _period: periods[i] || `${i}일 전` }));

    const val = parseInt(fgData[0].value);
    const z = fgZone(val);
    const korLabel = { 'Extreme Fear':'극도의 공포','Fear':'공포','Neutral':'중립','Greed':'탐욕','Extreme Greed':'극도의 탐욕' }[fgData[0].value_classification] || fgData[0].value_classification;

    // Header badge
    const el = document.getElementById('fgValue');
    el.textContent = val;
    el.style.color = z.color;
    document.getElementById('fgText').textContent = korLabel;

    // Modal
    document.getElementById('fgModalNum').textContent = val;
    document.getElementById('fgModalNum').style.color = z.color;
    const labelEl = document.getElementById('fgModalLabel');
    labelEl.textContent = korLabel;
    labelEl.style.color = z.color;
    drawGauge(val);
    buildFgTable(fgData);
  } catch {}
}
loadFearGreed();
setInterval(loadFearGreed, 5 * 60 * 1000);

// Modal open/close
const fgOverlay = document.getElementById('fgOverlay');
const fgCloseBtn = document.getElementById('fgClose');

function openFgModal() {
  const modal = fgOverlay.querySelector('.fg-modal');
  fgOverlay.classList.add('show');
  fgOverlay.style.opacity = '0';
  modal.style.opacity = '0';
  modal.style.transform = 'translateY(24px) scale(0.96)';
  modal.style.transition = 'none';
  fgOverlay.style.transition = 'none';
  // Force reflow
  void fgOverlay.offsetWidth;
  fgOverlay.style.transition = 'opacity 0.25s ease';
  modal.style.transition = 'opacity 0.28s cubic-bezier(0.34,1.56,0.64,1), transform 0.28s cubic-bezier(0.34,1.56,0.64,1)';
  fgOverlay.style.opacity = '1';
  modal.style.opacity = '1';
  modal.style.transform = 'translateY(0) scale(1)';
  setTimeout(() => fgCloseBtn.focus(), 50);
}

function closeFgModal() {
  const modal = fgOverlay.querySelector('.fg-modal');
  fgOverlay.style.transition = 'opacity 0.22s ease';
  modal.style.transition = 'opacity 0.2s ease, transform 0.2s cubic-bezier(0.36,0,0.66,-0.3)';
  fgOverlay.style.opacity = '0';
  modal.style.opacity = '0';
  modal.style.transform = 'translateY(16px) scale(0.96)';
  setTimeout(() => {
    fgOverlay.classList.remove('show');
    fgOverlay.style.opacity = '';
    fgOverlay.style.transition = '';
    modal.style.opacity = '';
    modal.style.transform = '';
    modal.style.transition = '';
  }, 220);
}

document.querySelector('.fg-badge').addEventListener('click', openFgModal);
fgCloseBtn.addEventListener('click', closeFgModal);
fgOverlay.addEventListener('click', e => {
  if (e.target === fgOverlay) closeFgModal();
});

// ESC to close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && fgOverlay.classList.contains('show')) closeFgModal();
});

// Focus trap
fgOverlay.addEventListener('keydown', e => {
  if (!fgOverlay.classList.contains('show')) return;
  const focusable = fgOverlay.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])');
  const first = focusable[0];
  const last = focusable[focusable.length - 1];
  if (e.key === 'Tab') {
    if (e.shiftKey) {
      if (document.activeElement === first) { e.preventDefault(); last.focus(); }
    } else {
      if (document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  }
});


/* ── 3. Market Sessions ── */

// 날짜를 'YYYY-MM-DD' 문자열로
function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// KRX 공휴일 (2025~2026, 토/일 제외 별도 휴장일)
const KRX_HOLIDAYS = new Set([
  // 2025
  '2025-01-01','2025-01-28','2025-01-29','2025-01-30',
  '2025-03-01','2025-05-05','2025-05-06','2025-06-06',
  '2025-08-15','2025-10-03','2025-10-06','2025-10-07','2025-10-08',
  '2025-12-25',
  // 2026
  '2026-01-01','2026-01-28','2026-01-29','2026-01-30',
  '2026-03-01','2026-05-05','2026-05-25',
  '2026-06-06','2026-08-17',
  '2026-09-24','2026-09-25','2026-09-26',
  '2026-10-09','2026-12-25',
]);

// NYSE 공휴일 (2025~2026)
const NYSE_HOLIDAYS = new Set([
  // 2025
  '2025-01-01','2025-01-20','2025-02-17','2025-04-18',
  '2025-05-26','2025-06-19','2025-07-04','2025-09-01',
  '2025-11-27','2025-12-25',
  // 2026
  '2026-01-01','2026-01-19','2026-02-16','2026-04-03',
  '2026-05-25','2026-06-19','2026-07-03','2026-09-07',
  '2026-11-26','2026-12-25',
]);

function fmtRemain(ms, label) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${label} ${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}

// 다음 영업일 찾기
function nextTradingDay(d, holidaySet) {
  const next = new Date(d);
  next.setDate(next.getDate() + 1);
  while (next.getDay() === 0 || next.getDay() === 6 || holidaySet.has(toDateStr(next))) {
    next.setDate(next.getDate() + 1);
  }
  return next;
}

function updateSessions() {
  const now = new Date();

  // ── KRX (KST) ──
  const kst = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  const kDay = kst.getDay();
  const kDateStr = toDateStr(kst);
  const kH = kst.getHours(), kM = kst.getMinutes(), kS = kst.getSeconds();
  const kMin = kH * 60 + kM;
  const krxOpen = 9 * 60, krxClose = 15 * 60 + 30;
  const isKrxHoliday = kDay === 0 || kDay === 6 || KRX_HOLIDAYS.has(kDateStr);
  const isKrxOpen = !isKrxHoliday && kMin >= krxOpen && kMin < krxClose;

  const krStatusEl = document.getElementById('krStatus');
  const krRemainEl = document.getElementById('krRemain');

  if (isKrxHoliday) {
    krStatusEl.className = 'session-status closed';
    krStatusEl.textContent = KRX_HOLIDAYS.has(kDateStr) ? '휴장 (공휴일)' : '휴장 (주말)';
    krRemainEl.textContent = '';
  } else if (isKrxOpen) {
    krStatusEl.className = 'session-status open';
    krStatusEl.textContent = '개장 중';
    const closeMs = (krxClose - kMin - 1) * 60000 - kS * 1000 + (60 - kst.getMilliseconds() / 1000) * 1000;
    krRemainEl.textContent = fmtRemain(closeMs, '마감까지');
  } else {
    krStatusEl.className = 'session-status closed';
    krStatusEl.textContent = '폐장';
    let nextOpen;
    if (kMin < krxOpen) {
      nextOpen = new Date(kst);
      nextOpen.setHours(9, 0, 0, 0);
    } else {
      nextOpen = nextTradingDay(kst, KRX_HOLIDAYS);
      nextOpen.setHours(9, 0, 0, 0);
    }
    krRemainEl.textContent = fmtRemain(nextOpen - kst, '개장까지');
  }

  const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const uDay = et.getDay();
  const uDateStr = toDateStr(et);
  const uH = et.getHours(), uM = et.getMinutes(), uS = et.getSeconds();
  const uMin = uH * 60 + uM;

  // 분 단위 경계
  const PRE_OPEN   = 4  * 60;       // 04:00
  const NYSE_OPEN  = 9  * 60 + 30;  // 09:30
  const NYSE_CLOSE = 16 * 60;       // 16:00
  const AFTER_END  = 20 * 60;       // 20:00

  const isNyseHoliday = uDay === 0 || uDay === 6 || NYSE_HOLIDAYS.has(uDateStr);

  const usStatusEl = document.getElementById('usStatus');
  const usRemainEl = document.getElementById('usRemain');

  if (isNyseHoliday) {
    usStatusEl.className = 'session-status closed';
    usStatusEl.textContent = NYSE_HOLIDAYS.has(uDateStr) ? '휴장 (공휴일)' : '휴장 (주말)';
    usRemainEl.textContent = '';
  } else if (uMin < PRE_OPEN) {
    // 자정~04:00 — 완전 폐장
    usStatusEl.className = 'session-status closed';
    usStatusEl.textContent = '폐장';
    const nextPre = new Date(et);
    nextPre.setHours(4, 0, 0, 0);
    usRemainEl.textContent = fmtRemain(nextPre - et, '프리마켓까지');
  } else if (uMin < NYSE_OPEN) {
    usStatusEl.className = 'session-status pre-market';
    usStatusEl.textContent = '프리마켓';
    const nextOpen = new Date(et);
    nextOpen.setHours(9, 30, 0, 0);
    usRemainEl.textContent = fmtRemain(nextOpen - et, '본장까지');
  } else if (uMin < NYSE_CLOSE) {
    usStatusEl.className = 'session-status open';
    usStatusEl.textContent = '본장';
    const nextClose = new Date(et);
    nextClose.setHours(16, 0, 0, 0);
    usRemainEl.textContent = fmtRemain(nextClose - et, '애프터마켓까지');
  } else if (uMin < AFTER_END) {
    usStatusEl.className = 'session-status after-market';
    usStatusEl.textContent = '애프터마켓';
    const nextEnd = new Date(et);
    nextEnd.setHours(20, 0, 0, 0);
    usRemainEl.textContent = fmtRemain(nextEnd - et, '마감까지');
  } else {
    usStatusEl.className = 'session-status closed';
    usStatusEl.textContent = '폐장';
    const nextPre = nextTradingDay(et, NYSE_HOLIDAYS);
    nextPre.setHours(4, 0, 0, 0);
    usRemainEl.textContent = fmtRemain(nextPre - et, '프리마켓까지');
  }
}
updateSessions();
setInterval(updateSessions, 1000);

/* ── 4. Clock (HH:MM:SS.d) with 12/24h toggle ── */
let is24h = true;

function updateClock() {
  const now = new Date();
  const yy = String(now.getFullYear()).slice(2);
  const mm = now.getMonth() + 1;
  const dd = now.getDate();
  document.getElementById('date').textContent = `${yy}년 ${mm}월 ${dd}일`;

  const d = Math.floor(now.getMilliseconds() / 100);
  const min = String(now.getMinutes()).padStart(2,'0');
  const ss  = String(now.getSeconds()).padStart(2,'0');

  let timeStr;
  if (is24h) {
    const hh = String(now.getHours()).padStart(2,'0');
    timeStr = `${hh}:${min}:${ss}.${d}`;
  } else {
    const raw = now.getHours();
    const ampm = raw < 12 ? '오전' : '오후';
    const h12 = raw % 12 || 12;
    timeStr = `${ampm} ${h12}:${min}:${ss}.${d}`;
  }
  document.getElementById('clock').textContent = timeStr;
}

const clockEl = document.getElementById('clock');
clockEl.style.cursor = 'pointer';
clockEl.title = '클릭하여 시간 형식 변경';
clockEl.addEventListener('click', () => {
  is24h = !is24h;
  updateClock();
});

updateClock();
setInterval(updateClock, 100);

/* ── 5. Advanced Chart ── */
let currentTf = '5';

function loadChart(tf) {
  const frame = document.getElementById('chartFrame');
  frame.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'tradingview-widget-container';
  frame.appendChild(wrap);

  const s = document.createElement('script');
  s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  s.async = true;
  s.textContent = JSON.stringify({
    autosize: true,
    symbol: 'FX_IDC:USDKRW',
    interval: tf,
    timezone: 'Asia/Seoul',
    theme: 'dark',
    style: '1',
    locale: 'ko',
    hide_top_toolbar: true,
    hide_legend: true,
    allow_symbol_change: false,
    save_image: false,
    hide_volume: true,
    support_host: 'https://www.tradingview.com',
    backgroundColor: '#101013',
    gridColor: 'rgba(28,28,34,1)',
    overrides: {
      'paneProperties.background': '#101013',
      'paneProperties.backgroundType': 'solid',
      'scalesProperties.textColor': '#52526a',
      'scalesProperties.lineColor': '#1c1c22',
      'mainSeriesProperties.candleStyle.upColor': '#00e5a0',
      'mainSeriesProperties.candleStyle.downColor': '#ff4560',
      'mainSeriesProperties.candleStyle.borderUpColor': '#00e5a0',
      'mainSeriesProperties.candleStyle.borderDownColor': '#ff4560',
      'mainSeriesProperties.candleStyle.wickUpColor': 'rgba(0,229,160,0.55)',
      'mainSeriesProperties.candleStyle.wickDownColor': 'rgba(255,69,96,0.55)',
    },
  });
  wrap.appendChild(s);
}

document.querySelectorAll('.tf').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tf').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTf = btn.dataset.tf;
    loadChart(currentTf);
  });
});

loadChart(currentTf);
