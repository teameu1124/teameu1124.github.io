<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>USD/KRW 실시간 환율</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090b;
  --surface: #101013;
  --border: #1c1c22;
  --text: #ededf2;
  --muted: #52526a;
  --accent: #00e5a0;
  --accent-dim: rgba(0,229,160,0.10);
  --red: #ff4560;
  --red-dim: rgba(255,69,96,0.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', 'Courier New', monospace;
  -webkit-font-smoothing: antialiased;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,160,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,160,0.018) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative; z-index: 1;
  width: 100%; max-width: 460px;
  margin: 0 auto; min-height: 100dvh;
  display: flex; flex-direction: column;
  padding: 0 18px;
}

/* HEADER */
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0 8px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.live-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: 9px; letter-spacing: 0.14em; color: #38385a;
  border: 1px solid var(--border); border-radius: 20px; padding: 3px 9px;
}
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent);
  animation: blink 2.2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.neon-title {
  font-family: 'Syne', 'Arial Black', sans-serif;
  font-size: 16px; font-weight: 700; letter-spacing: 0.18em;
  color: #00c987;
  text-shadow: 0 0 6px rgba(0,229,160,0.25), 0 0 14px rgba(0,229,160,0.12);
  position: absolute; left: 50%; transform: translateX(-50%);
}

/* FEAR & GREED BADGE */
.fg-badge { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; cursor: pointer; }
.fg-label { font-size: 7px; letter-spacing: 0.16em; color: #38385a; text-transform: uppercase; }
.fg-value { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 700; letter-spacing: 0.02em; line-height: 1; }
.fg-text  { font-size: 8px; letter-spacing: 0.08em; color: #6a6a88; font-weight: 500; }

/* PRICE BLOCK */
.price-block { display: flex; flex-direction: column; align-items: center; padding: 44px 0 8px; flex-shrink: 0; }
.price-display { display: flex; flex-direction: column; align-items: center; margin-bottom: 6px; width: 100%; }
.price-row { display: flex; align-items: baseline; gap: 6px; justify-content: center; }
.price-value {
  font-family: 'Inter', sans-serif;
  font-size: 36px; font-weight: 600; letter-spacing: -0.02em;
  color: var(--text); line-height: 1; transition: color 0.15s;
}
.price-currency { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 0.04em; margin-bottom: 3px; }
.price-change   { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; color: var(--muted); }
.price-change.up   { color: var(--accent); }
.price-change.down { color: var(--red); }
.date-line { font-size: 9px; color: #38385a; letter-spacing: 0.1em; margin-top: 14px; }
.clock { font-size: 13px; font-weight: 500; color: #6a6a88; letter-spacing: 0.06em; margin-top: 2px; cursor: pointer; transition: color 0.15s; user-select: none; }
.clock:hover { color: #a0a0c0; }

/* MARKET SESSIONS */
.sessions { display: flex; justify-content: center; width: 100%; margin-top: 16px; gap: 8px; }
.session-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }
.session-name   { font-size: 8px; letter-spacing: 0.1em; color: #38385a; white-space: nowrap; align-self: flex-start; }
.session-status { font-family: 'Syne', 'Arial Black', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.04em; white-space: nowrap; align-self: center; }
.session-status.open         { color: var(--accent); }
.session-status.pre-market   { color: #f5c518; }
.session-status.after-market { color: #ff8c42; }
.session-status.closed       { color: var(--red); }
.session-remain { font-size: 9px; color: #6a6a88; letter-spacing: 0.02em; white-space: nowrap; align-self: center; font-weight: 500; }

/* FG MODAL */
.fg-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
.fg-modal-overlay.show { display: flex; }
.fg-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px 22px; width: min(340px, 90vw); display: flex; flex-direction: column; gap: 16px; }
.fg-modal-header { display: flex; justify-content: space-between; align-items: center; }
.fg-modal-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.08em; color: var(--text); }
.fg-modal-close { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: var(--border); border: none; border-radius: 50%; color: var(--muted); font-size: 13px; cursor: pointer; line-height: 1; flex-shrink: 0; transition: background 0.15s, color 0.15s; outline: none; }
.fg-modal-close:hover { background: var(--red-dim); color: var(--red); }
.fg-gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.fg-gauge-svg { width: 100%; max-width: 260px; }
.fg-gauge-num { font-family: 'DM Mono', monospace; font-size: 42px; font-weight: 500; letter-spacing: -0.02em; }
.fg-gauge-label { font-family: 'Syne', 'Arial Black', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; }
.fg-query-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
.fg-query-time { font-size: 9px; color: #38385a; letter-spacing: 0.08em; }
.fg-refresh { background: none; border: 1px solid #2a2a3a; border-radius: 4px; color: #52526a; font-size: 11px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; line-height: 1; transition: color 0.15s, border-color 0.15s; outline: none; overflow: hidden; position: relative; }
.fg-refresh:hover { color: var(--accent); border-color: var(--accent); }
.fg-refresh .icon { display: inline-block; transition: opacity 0.2s; }
.fg-refresh.spinning .icon { animation: spinIcon 0.5s linear; }
.fg-refresh.loading .icon  { opacity: 0; }
.fg-refresh.loading::after { content: ''; position: absolute; width: 8px; height: 8px; border: 1.5px solid #52526a; border-top-color: var(--accent); border-radius: 50%; animation: spinLoader 0.7s linear infinite; }
@keyframes spinIcon   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes spinLoader { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.fg-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.fg-table th { text-align: left; color: var(--muted); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 6px; border-bottom: 1px solid var(--border); font-weight: 400; }
.fg-table td { padding: 7px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--text); }
.fg-table tr:last-child td { border-bottom: none; }
.fg-pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 600; letter-spacing: 0.06em; }

/* CHART ACCORDION */
.chart-block  { display: flex; flex-direction: column; gap: 6px; }
.chart-header { display: flex; align-items: center; justify-content: space-between; }
.chart-toggle { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #0e1a14 0%, #101013 100%); border: 1px solid var(--border); border-radius: 6px; padding: 7px 14px; cursor: pointer; transition: all 0.2s; user-select: none; }
.chart-toggle:hover { border-color: #2e2e42; box-shadow: 0 0 16px rgba(0,229,160,0.08); }
.chart-toggle-label,
.chart-toggle-action { font-family: 'Syne', 'Arial Black', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; color: var(--accent); text-transform: uppercase; text-shadow: 0 0 8px rgba(0,229,160,0.3); }
.chart-chevron { font-size: 9px; color: rgba(0,229,160,0.5); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); display: inline-block; }
.chart-toggle.closed .chart-chevron { transform: rotate(180deg); }
.tf-group { display: flex; gap: 3px; align-items: center; }
.tf { font-family: 'DM Mono', monospace; font-size: 10px; color: #38385a; background: none; border: 1px solid transparent; padding: 4px 9px; border-radius: 4px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; }
.tf:hover { color: #6a6a88; }
.tf.active { color: var(--accent); border-color: rgba(0,229,160,0.3); background: var(--accent-dim); font-weight: 600; }
.chart-panel { max-height: 400px; overflow: hidden; transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease; opacity: 1; }
.chart-panel.closed { max-height: 0; opacity: 0; }
.chart-frame { width: 100%; height: 280px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--surface); }
.chart-frame .tradingview-widget-container { width: 100%; height: 280px; }

/* STAMP */
.stamp { text-align: center; padding: 4px 0 12px; font-size: 9px; color: #2e2e42; letter-spacing: 0.1em; flex-shrink: 0; }

/* HEATMAP ACCORDION */
.heatmap-block { width: 100%; padding: 0 0 8px; margin-top: 20px; display: flex; flex-direction: column; align-items: flex-end; }
.heatmap-toggle { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #0e1a14 0%, #101013 100%); border: 1px solid var(--border); border-radius: 6px; padding: 7px 14px; cursor: pointer; transition: all 0.2s; user-select: none; }
.heatmap-toggle:hover { border-color: #2e2e42; box-shadow: 0 0 16px rgba(0,229,160,0.08); }
.heatmap-toggle.open { border-radius: 6px 6px 0 0; border-bottom-color: transparent; }
.heatmap-toggle-label,
.heatmap-toggle-action { font-family: 'Syne', 'Arial Black', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; color: var(--accent); text-transform: uppercase; text-shadow: 0 0 8px rgba(0,229,160,0.3); }
.heatmap-chevron { font-size: 9px; color: rgba(0,229,160,0.5); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); display: inline-block; }
.heatmap-toggle.open .heatmap-chevron { transform: rotate(180deg); }
.heatmap-panel { max-height: 0; width: 100%; overflow: hidden; transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease; border: 1px solid transparent; border-top: none; border-radius: 0 0 8px 8px; background: var(--surface); opacity: 0; }
.heatmap-panel.open { max-height: 360px; border-color: var(--border); opacity: 1; }
.heatmap-frame { width: 100%; height: 340px; }
.heatmap-frame .tradingview-widget-container,
.heatmap-frame .tradingview-widget-container__widget { width: 100% !important; height: 340px !important; }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="fg-badge">
      <span class="fg-label">공탐지수</span>
      <span class="fg-value" id="fgValue">—</span>
      <span class="fg-text" id="fgText">—</span>
    </div>
    <div class="neon-title">실시간 환율</div>
    <div class="live-badge"><div class="dot"></div>LIVE</div>
  </div>

  <!-- PRICE -->
  <div class="price-block">
    <div class="price-display">
      <div class="price-row">
        <span class="price-value" id="priceValue">—</span>
        <span class="price-currency">KRW</span>
        <span class="price-change" id="priceChange"></span>
      </div>
    </div>
    <div class="date-line" id="date"></div>
    <div class="clock" id="clock"></div>
    <div class="sessions">
      <div class="session-card">
        <span class="session-name">🇰🇷 국장 (KRX)</span>
        <span class="session-status" id="krStatus">—</span>
        <span class="session-remain" id="krRemain"></span>
      </div>
      <div class="session-card">
        <span class="session-name">🇺🇸 미장 (NYSE)</span>
        <span class="session-status" id="usStatus">—</span>
        <span class="session-remain" id="usRemain"></span>
      </div>
    </div>
  </div>

  <!-- FG MODAL -->
  <div class="fg-modal-overlay" id="fgOverlay">
    <div class="fg-modal">
      <div class="fg-modal-header">
        <span class="fg-modal-title">공포 &amp; 탐욕 지수</span>
        <button class="fg-modal-close" id="fgClose">✕</button>
      </div>
      <div class="fg-gauge-wrap">
        <svg class="fg-gauge-svg" viewBox="-10 -20 320 185" id="fgSvg"></svg>
        <div class="fg-gauge-num" id="fgModalNum">—</div>
        <div class="fg-gauge-label" id="fgModalLabel">—</div>
        <div class="fg-query-row">
          <div class="fg-query-time" id="fgQueryTime"></div>
          <button class="fg-refresh" id="fgRefresh" title="새로고침"><span class="icon">↻</span></button>
        </div>
      </div>
      <table class="fg-table">
        <thead><tr><th>기간</th><th>수치</th><th>상태</th></tr></thead>
        <tbody id="fgTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart-block">
    <div class="chart-header">
      <div class="chart-toggle" id="chartToggle">
        <span class="chart-toggle-label">차트</span>
        <span class="chart-toggle-action" id="chartAction">닫기</span>
        <span class="chart-chevron">▼</span>
      </div>
      <div class="tf-group">
        <button class="tf" data-tf="1">1분</button>
        <button class="tf active" data-tf="5">5분</button>
        <button class="tf" data-tf="15">15분</button>
        <button class="tf" data-tf="60">1시간</button>
        <button class="tf" data-tf="D">1일</button>
      </div>
    </div>
    <div class="chart-panel" id="chartPanel">
      <div class="chart-frame" id="chartFrame"></div>
    </div>
  </div>

  <!-- HEATMAP -->
  <div class="heatmap-block">
    <div class="heatmap-toggle" id="heatmapToggle">
      <span class="heatmap-toggle-label">히트맵</span>
      <span class="heatmap-toggle-action" id="heatmapAction">열기</span>
      <span class="heatmap-chevron">▼</span>
    </div>
    <div class="heatmap-panel" id="heatmapPanel">
      <div class="heatmap-frame" id="heatmapFrame"></div>
    </div>
  </div>

  <div class="stamp">TradingView 실시간 데이터</div>

</div>
<script>
/* ── 0. 가격 + 타이틀 (Cloudflare Worker, 10초 갱신) ── */
let lastPrice = null;
const fmtPrice = p => p.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

async function updatePrice() {
  try {
    const r = await fetch('https://krw-proxy.baksu793.workers.dev/', { signal: AbortSignal.timeout(5000) });
    const d = await r.json();
    if (!d.price) return;
    const price     = d.price;
    const prevClose = d.prevClose || price;
    document.title  = '\u20a9' + fmtPrice(price) + ' | USD/KRW';
    const valEl    = document.getElementById('priceValue');
    const changeEl = document.getElementById('priceChange');
    valEl.textContent = fmtPrice(price);
    const diff = price - prevClose;
    const pct  = (diff / prevClose * 100).toFixed(2);
    const sign = diff >= 0 ? '+' : '';
    changeEl.textContent = sign + diff.toFixed(2) + '  (' + sign + pct + '%)';
    changeEl.className   = 'price-change ' + (diff >= 0 ? 'up' : 'down');
    if (lastPrice !== null && lastPrice !== price) {
      valEl.style.color = price > lastPrice ? 'var(--accent)' : 'var(--red)';
      setTimeout(() => { valEl.style.color = 'var(--text)'; }, 600);
    }
    lastPrice = price;
  } catch { document.title = 'USD/KRW 실시간 환율'; }
}
updatePrice();
setInterval(updatePrice, 10 * 1000);

/* ── 1. Fear & Greed Index ── */
const FG_ZONES = [
  { max: 25,  color: '#ff4560', bg: 'rgba(255,69,96,0.15)' },
  { max: 45,  color: '#ff8c42', bg: 'rgba(255,140,66,0.15)' },
  { max: 55,  color: '#f5c518', bg: 'rgba(245,197,24,0.15)' },
  { max: 75,  color: '#7ecf6e', bg: 'rgba(126,207,110,0.15)' },
  { max: 100, color: '#00e5a0', bg: 'rgba(0,229,160,0.15)' },
];
const FG_KOR = { 'Extreme Fear':'극도의 공포','Fear':'공포','Neutral':'중립','Greed':'탐욕','Extreme Greed':'극도의 탐욕' };
const FG_PERIOD_LABELS = ['현재','어제','1주일 전','1달 전'];
function fgZone(val) { return FG_ZONES.find(z => val <= z.max) || FG_ZONES[4]; }

function drawGauge(val) {
  const svg = document.getElementById('fgSvg');
  const cx = 150, cy = 145, r = 110, strokeW = 42;
  const zones = [
    { from:0,  to:25,  color:'#ff4560', label:'극도\n공포' },
    { from:25, to:45,  color:'#ff8c42', label:'공포' },
    { from:45, to:55,  color:'#f5c518', label:'중립' },
    { from:55, to:75,  color:'#7ecf6e', label:'탐욕' },
    { from:75, to:100, color:'#00e5a0', label:'극도\n탐욕' },
  ];
  const brightColors = { '#ff4560':'#ff8fa3','#ff8c42':'#ffb380','#f5c518':'#ffe066','#7ecf6e':'#b6f0a8','#00e5a0':'#7fffd4' };
  const boundaries = [0,25,45,55,75,100];
  function polarToXY(deg, radius) {
    const rad = (deg - 180) * Math.PI / 180;
    return { x: cx + radius * Math.cos(rad), y: cy + radius * Math.sin(rad) };
  }
  function valToDeg(v) { return v * 1.8; }
  let html = '';
  boundaries.forEach(v => {
    const deg = valToDeg(v), p1 = polarToXY(deg, r-strokeW/2-1), p2 = polarToXY(deg, r+strokeW/2+1);
    html += '<line x1="'+p1.x+'" y1="'+p1.y+'" x2="'+p2.x+'" y2="'+p2.y+'" stroke="#09090b" stroke-width="2.5"/>';
  });
  zones.forEach(z => {
    const a1=valToDeg(z.from),a2=valToDeg(z.to),p1=polarToXY(a1,r),p2=polarToXY(a2,r),large=(a2-a1)>180?1:0;
    html += '<path d="M '+p1.x+' '+p1.y+' A '+r+' '+r+' 0 '+large+' 1 '+p2.x+' '+p2.y+'" fill="none" stroke="'+z.color+'" stroke-width="'+strokeW+'" stroke-opacity="0.18"/>';
  });
  if (val > 0) {
    for (const seg of zones) {
      if (seg.from >= val) break;
      const segEnd=Math.min(seg.to,val),a1=valToDeg(seg.from),a2=valToDeg(segEnd),p1=polarToXY(a1,r),p2=polarToXY(a2,r),large=(a2-a1)>180?1:0;
      html += '<path d="M '+p1.x+' '+p1.y+' A '+r+' '+r+' 0 '+large+' 1 '+p2.x+' '+p2.y+'" fill="none" stroke="'+seg.color+'" stroke-width="'+strokeW+'" stroke-opacity="0.85"/>';
    }
  }
  boundaries.forEach(v => {
    const deg=valToDeg(v),p1=polarToXY(deg,r-strokeW/2),p2=polarToXY(deg,r+strokeW/2);
    html += '<line x1="'+p1.x+'" y1="'+p1.y+'" x2="'+p2.x+'" y2="'+p2.y+'" stroke="#09090b" stroke-width="2"/>';
  });
  const zone=fgZone(val),needleDeg=valToDeg(val);
  const nTip=polarToXY(needleDeg,r-strokeW/2-8),nL=polarToXY(needleDeg-90,5),nR=polarToXY(needleDeg+90,5);
  html += '<polygon points="'+nTip.x+','+nTip.y+' '+nL.x+','+nL.y+' '+nR.x+','+nR.y+'" fill="'+zone.color+'" opacity="0.95"/>';
  html += '<circle cx="'+cx+'" cy="'+cy+'" r="7" fill="'+zone.color+'" opacity="0.95"/>';
  zones.forEach(z => {
    const midDeg=valToDeg((z.from+z.to)/2),pos=polarToXY(midDeg,r),rotateDeg=midDeg-90;
    const bright=brightColors[z.color]||z.color,lines=z.label.split('\n'),lineH=13,totalH=(lines.length-1)*lineH;
    lines.forEach((line,i) => {
      const yOff=i*lineH-totalH/2;
      html += '<text x="'+pos.x+'" y="'+pos.y+'" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="800" font-family="DM Mono,monospace" fill="'+bright+'" transform="rotate('+rotateDeg+', '+pos.x+', '+pos.y+') translate(0, '+yOff+')">'+line+'</text>';
    });
  });
  [{v:0,color:'#ff4560'},{v:25,color:'#ff8c42'},{v:45,color:'#f5c518'},{v:55,color:'#7ecf6e'},{v:75,color:'#00e5a0'},{v:100,color:'#00e5a0'}].forEach(t => {
    const numPos=polarToXY(valToDeg(t.v),r+strokeW/2+14);
    html += '<text x="'+numPos.x+'" y="'+(numPos.y+3)+'" text-anchor="middle" font-size="9" font-weight="600" font-family="DM Mono,monospace" fill="'+t.color+'">'+t.v+'</text>';
  });
  for (let v=5;v<100;v+=5) {
    if (boundaries.includes(v)) continue;
    const deg=valToDeg(v),p1=polarToXY(deg,r+strokeW/2+1),p2=polarToXY(deg,r+strokeW/2+5);
    html += '<line x1="'+p1.x+'" y1="'+p1.y+'" x2="'+p2.x+'" y2="'+p2.y+'" stroke="#3a3a52" stroke-width="1"/>';
  }
  svg.innerHTML = html;
}

}

  const NYSE_NAMES = ["New Year's Day","Martin Luther King","Washington","Presidents","Good Friday","Memorial Day","Juneteenth","Independence Day","Labor Day","Thanksgiving","Christmas"];

  };
  const years = [new Date().getFullYear(), new Date().getFullYear()+1];
  for (const year of years) {
    try {
      const r = await fetch('https://date.nager.at/api/v3/PublicHolidays/'+year+'/US', {signal:AbortSignal.timeout(6000)});
      if (!r.ok) throw new Error();
      const data = await r.json();
      data.forEach(h => { if (NYSE_NAMES.some(n => h.name?.includes(n)||h.localName?.includes(n))) NYSE_HOLIDAYS.add(h.date); });
    } catch { (fallback[year]||[]).forEach(d => NYSE_HOLIDAYS.add(d)); }
  }
}

function fmtRemain(ms, label) {
  const totalSec=Math.floor(ms/1000),h=Math.floor(totalSec/3600),m=Math.floor((totalSec%3600)/60),s=totalSec%60;
  return label+' '+h+'h '+String(m).padStart(2,'0')+'m '+String(s).padStart(2,'0')+'s';
}
function nextTradingDay(d, holidaySet) {
  const next = new Date(d); next.setDate(next.getDate()+1);
  while (next.getDay()===0||next.getDay()===6||holidaySet.has(toDateStr(next))) next.setDate(next.getDate()+1);
  return next;
}

function updateSessions() {
  const now = new Date();
  const kst=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const kDateStr=toDateStr(kst),kMin=kst.getHours()*60+kst.getMinutes();
  const krxOpen=9*60,krxClose=15*60+30;
  const isKrxHoliday=kst.getDay()===0||kst.getDay()===6||KRX_HOLIDAYS.has(kDateStr);
  const krStatusEl=document.getElementById('krStatus'),krRemainEl=document.getElementById('krRemain');
  if (isKrxHoliday) {
    krStatusEl.className='session-status closed';
    krStatusEl.textContent=KRX_HOLIDAYS.has(kDateStr)?'휴장 (공휴일)':'휴장 (주말)';
    const nextOpen=nextTradingDay(kst,KRX_HOLIDAYS); nextOpen.setHours(9,0,0,0);
    krRemainEl.textContent=fmtRemain(nextOpen-kst,'개장까지');
  } else if (kMin>=krxOpen&&kMin<krxClose) {
    krStatusEl.className='session-status open'; krStatusEl.textContent='개장 중';
    krRemainEl.textContent=fmtRemain((krxClose-kMin-1)*60000-kst.getSeconds()*1000+(60-kst.getMilliseconds()/1000)*1000,'마감까지');
  } else {
    krStatusEl.className='session-status closed'; krStatusEl.textContent='폐장';
    let nextOpen; if (kMin<krxOpen) { nextOpen=new Date(kst); nextOpen.setHours(9,0,0,0); } else { nextOpen=nextTradingDay(kst,KRX_HOLIDAYS); nextOpen.setHours(9,0,0,0); }
    krRemainEl.textContent=fmtRemain(nextOpen-kst,'개장까지');
  }
  const et=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const uDateStr=toDateStr(et),uMin=et.getHours()*60+et.getMinutes();
  const PRE_OPEN=4*60,NYSE_OPEN=9*60+30,NYSE_CLOSE=16*60,AFTER_END=20*60;
  const isNyseHoliday=et.getDay()===0||et.getDay()===6||NYSE_HOLIDAYS.has(uDateStr);
  const usStatusEl=document.getElementById('usStatus'),usRemainEl=document.getElementById('usRemain');
  if (isNyseHoliday) {
    usStatusEl.className='session-status closed';
    usStatusEl.textContent=NYSE_HOLIDAYS.has(uDateStr)?'휴장 (공휴일)':'휴장 (주말)';
    const nextPre=nextTradingDay(et,NYSE_HOLIDAYS); nextPre.setHours(4,0,0,0);
    usRemainEl.textContent=fmtRemain(nextPre-et,'프리마켓까지');
  } else if (uMin<PRE_OPEN) {
    usStatusEl.className='session-status closed'; usStatusEl.textContent='폐장';
    const nextPre=new Date(et); nextPre.setHours(4,0,0,0); usRemainEl.textContent=fmtRemain(nextPre-et,'프리마켓까지');
  } else if (uMin<NYSE_OPEN) {
    usStatusEl.className='session-status pre-market'; usStatusEl.textContent='프리마켓';
    const nextOpen=new Date(et); nextOpen.setHours(9,30,0,0); usRemainEl.textContent=fmtRemain(nextOpen-et,'본장까지');
  } else if (uMin<NYSE_CLOSE) {
    usStatusEl.className='session-status open'; usStatusEl.textContent='본장';
    const nextClose=new Date(et); nextClose.setHours(16,0,0,0); usRemainEl.textContent=fmtRemain(nextClose-et,'애프터마켓까지');
  } else if (uMin<AFTER_END) {
    usStatusEl.className='session-status after-market'; usStatusEl.textContent='애프터마켓';
    const nextEnd=new Date(et); nextEnd.setHours(20,0,0,0); usRemainEl.textContent=fmtRemain(nextEnd-et,'마감까지');
  } else {
    usStatusEl.className='session-status closed'; usStatusEl.textContent='폐장';
    const nextPre=nextTradingDay(et,NYSE_HOLIDAYS); nextPre.setHours(4,0,0,0); usRemainEl.textContent=fmtRemain(nextPre-et,'프리마켓까지');
  }
}

let is24h = true;
function updateClock() {
  const now=new Date();
  document.getElementById('date').textContent=String(now.getFullYear()).slice(2)+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일';
  const d=Math.floor(now.getMilliseconds()/100),min=String(now.getMinutes()).padStart(2,'0'),ss=String(now.getSeconds()).padStart(2,'0');
  let t;
  if (is24h) t=String(now.getHours()).padStart(2,'0')+':'+min+':'+ss+'.'+d;
  else { const raw=now.getHours(); t=(raw<12?'오전':'오후')+' '+(raw%12||12)+':'+min+':'+ss+'.'+d; }
  document.getElementById('clock').textContent = t;
}
